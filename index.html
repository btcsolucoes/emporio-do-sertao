<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Cardapio indisponivel</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f0e6;
      --ink: #23170f;
      --muted: #6b5848;
      --line: rgba(35, 23, 15, .18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    main {
      width: min(460px, 100%);
      padding: 28px 24px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      line-height: 1.1;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <h1>Card&aacute;pio indispon&iacute;vel</h1>
    <p>Este card&aacute;pio digital n&atilde;o est&aacute; mais ativo.</p>
  </main>
</body>
</html>
